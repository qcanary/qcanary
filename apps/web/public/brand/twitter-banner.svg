<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" fill="none">
  <rect width="1500" height="500" fill="#0A0A0A"/>
  
  <!-- Decorative grid pattern -->
  <g opacity="0.05">
    <line x1="0" y1="0" x2="0" y2="500" stroke="#22C55E" stroke-width="1"/>
    <line x1="100" y1="0" x2="100" y2="500" stroke="#22C55E" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="500" stroke="#22C55E" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="500" stroke="#22C55E" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="500" stroke="#22C55E" stroke-width="1"/>
    <line x1="500" y1="0" x2="500" y2="500" stroke="#22C55E" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="500" stroke="#22C55E" stroke-width="1"/>
    <line x1="700" y1="0" x2="700" y2="500" stroke="#22C55E" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="500" stroke="#22C55E" stroke-width="1"/>
    <line x1="900" y1="0" x2="900" y2="500" stroke="#22C55E" stroke-width="1"/>
    <line x1="1000" y1="0" x2="1000" y2="500" stroke="#22C55E" stroke-width="1"/>
    <line x1="1100" y1="0" x2="1100" y2="500" stroke="#22C55E" stroke-width="1"/>
    <line x1="1200" y1="0" x2="1200" y2="500" stroke="#22C55E" stroke-width="1"/>
    <line x1="1300" y1="0" x2="1300" y2="500" stroke="#22C55E" stroke-width="1"/>
    <line x1="1400" y1="0" x2="1400" y2="500" stroke="#22C55E" stroke-width="1"/>
    <line x1="1500" y1="0" x2="1500" y2="500" stroke="#22C55E" stroke-width="1"/>
  </g>
  
  <!-- Glow effect -->
  <ellipse cx="400" cy="250" rx="300" ry="250" fill="#22C55E" opacity="0.08"/>
  
  <!-- Logo mark -->
  <g transform="translate(120, 250)">
    <circle cx="0" cy="-8" r="60" fill="none" stroke="#22C55E" stroke-width="18"/>
    <path d="M 38 30 L 65 58" stroke="#22C55E" stroke-width="18" stroke-linecap="round"/>
    <g transform="translate(-12, -30)">
      <ellipse cx="0" cy="0" rx="14" ry="10" fill="#22C55E"/>
      <circle cx="13" cy="-7" r="7" fill="#22C55E"/>
      <circle cx="15" cy="-8" r="2" fill="#0A0A0A"/>
      <path d="M 19 -7 L 24 -5 L 19 -4" fill="#0A0A0A"/>
    </g>
  </g>
  
  <!-- Text -->
  <g transform="translate(200, 255)">
    <text x="0" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="700" fill="#FAFAFA" letter-spacing="-1">Qcanary</text>
    <text x="0" y="35" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#71717A" letter-spacing="0.5">BullMQ Monitoring Dashboard</text>
  </g>
  
  <!-- Tagline -->
  <text x="750" y="255" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#22C55E" text-anchor="middle" font-weight="600">
    Know when your jobs fail.
  </text>
  <text x="750" y="290" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#71717A" text-anchor="middle">
    Before your users do.
  </text>
</svg>
