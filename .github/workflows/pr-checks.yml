name: PR Checks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint (API: tsc, Web: next lint)
        run: npm run lint
        continue-on-error: true
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: 'pk_test_placeholder'
          NEXT_PUBLIC_SUPABASE_URL: 'https://placeholder.supabase.co'
          NEXT_PUBLIC_SUPABASE_ANON_KEY: 'placeholder-anon-key'

      - name: Typecheck API
        run: cd apps/api && npx tsc --noEmit

      - name: Typecheck Web
        run: cd apps/web && npx tsc --noEmit
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: 'pk_test_placeholder'
          NEXT_PUBLIC_SUPABASE_URL: 'https://placeholder.supabase.co'
          NEXT_PUBLIC_SUPABASE_ANON_KEY: 'placeholder-anon-key'

  test-api:
    name: API Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run API tests
        run: cd apps/api && npm test

  test-web:
    name: Web Build & Test
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Web
        run: cd apps/web && npm run build
        continue-on-error: true
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: 'pk_test_placeholder'
          NEXT_PUBLIC_SUPABASE_URL: 'https://placeholder.supabase.co'
          NEXT_PUBLIC_SUPABASE_ANON_KEY: 'placeholder-anon-key'
          NEXT_PUBLIC_APP_URL: 'https://qcanary.dev'
          SUPABASE_URL: 'https://placeholder.supabase.co'
          SUPABASE_SERVICE_ROLE_KEY: 'placeholder-key'
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}

      # Web has no test script currently — placeholder for future
      - name: Run Web tests
        run: cd apps/web && npm test 2>/dev/null || echo 'No web tests configured yet'
        continue-on-error: true
